<!DOCTYPE html>
<html>
<head>
  <title>My Web Diary Login</title>
</head>

<body>
  <h2>Login to My Diary</h2>

  <input id="email" placeholder="Email@diary.com" />
  <br><br>

  <input id="password" type="password" placeholder="Password" />
  <br><br>

  <button onclick="login()">Login</button>

  <p id="msg"></p>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } 
    from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCHHuxG8iaUK4rHvUNDj_uazPaRWF9DuMc",
    authDomain: "my-web-diary-d9280.firebaseapp.com",
    projectId: "my-web-diary-d9280",
    storageBucket: "my-web-diary-d9280.firebasestorage.app",
    messagingSenderId: "252077344584",
    appId: "1:252077344584:web:d80e4feafc200a513d157d",
    measurementId: "G-B0Y65EVSR4"
  };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.login = async function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        document.getElementById("msg").innerText = "Login successful!";
        
        // redirect to your diary page
        window.location.href = "diary.html";

      } catch (error) {
        document.getElementById("msg").innerText = "Login failed: " + error.message;
      }
    };
  </script>
</body>
</html>
